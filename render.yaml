services:
  - type: web
    name: teach-sim-ai
    runtime: docker
    plan: free
    branch: main
    autoDeployTrigger: commit
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: AI_CORS_ALLOWED_ORIGINS
        value: https://teach-sim.onrender.com,http://localhost:5173
