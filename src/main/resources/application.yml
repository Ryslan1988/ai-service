server:
  port: ${PORT:8087}
  address: 0.0.0.0

app:
  cors:
    allowed-origins: ${AI_CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring:
  main:
    lazy-initialization: true
  config:
    import: optional:file:.env[.properties]
  application:
    name: ai-service
  ai:
    model:
      chat: google-genai
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          model: ${GEMINI_MODEL:gemini-3.5-flash}
          temperature: 0.55
          max-output-tokens: 4096
          thinking-level: MINIMAL
          response-mime-type: application/json
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1s
        multiplier: 2
        max-interval: 10s
      on-client-errors: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
